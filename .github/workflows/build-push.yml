name: Build and Push to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'sample-app/**'
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: devportal-nginx-test

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu:latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS-KEY-ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET-ACCESS-KEY}}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push images to ECR
        id: build-images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.output.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./sample-app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Update Helm Chart Image Tag
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.output.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|repository:.*|repository: $ECR_REGISTRY/ECR_REPOSITORY|g" apps/nginx-test/values.yaml
          sed -i "s|tag:.*|tag: $IMAGE_TAG|g" apps/nginx-test/values.yaml

      - name: Commit and Push Updated .yaml Values
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add apps/nginx-test/values.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
        