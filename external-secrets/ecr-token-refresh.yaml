apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-token-refresher
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-token-refresher
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "delete", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-token-refresher
  namespace: default
subjects:
  - kind: ServiceAccount
    name: ecr-token-refresher
    namespace: default
roleRef:
  kind: Role
  name: ecr-token-refresher
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresher
  namespace: default

spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-token-refresher
          restartPolicy: Never

          containers:
            - name: ecr-token-refresher
              image: heyvaldemar/aws-kubectl

              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: access-key
                      optional: false

                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: secret-access-key
                      optional: false

                - name: AWS_DEFAULT_REGION
                  value: ap-south-1

              command:
                - /bin/sh
                - -c
                - |
                  ECR_TOKEN=$(aws ecr get-login-password --region ap-south-1)

                  kubectl delete secret ecr-credentials --ignore-not-found

                  kubectl create secret docker-registry ecr-credentials \
                    --docker-server=746486152802.dkr.ecr.ap-south-1.amazonaws.com \
                    --docker-username=AWS \
                    --docker-password=$ECR_TOKEN \
                    --namespace default

                  echo "ECR credentials refreshed successfully"

