apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:
  name: devportal-root
  namespace: argocd
  finalizers:
    - resources-finalizers.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://github.com/HardikYadav99/devportal-gitops
    targetRevision: main
    path: argocd-apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    