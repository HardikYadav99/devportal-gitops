apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ajay
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/HardikYadav99/devportal-gitops
    targetRevision: main
    path: workload
    helm:
      valueFiles:
        - ../source-app/ajay/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ajay
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true