apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx-test
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/HardikYadav99/devportal-gitops
    targetRevision: main
    path: /apps/nginx-test
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace: true