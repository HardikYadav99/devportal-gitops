apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: testdelete
  namespace: argocd
  finalizers:
    - resources-finalizers.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/HardikYadav99/devportal-gitops
    targetRevision: main
    path: workload
    helm:
      valueFiles:
        - ../source-app/testdelete/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true