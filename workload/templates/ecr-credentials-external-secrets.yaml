apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: ecr-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 6h
  secretStoreRef:
    name: aws-ssm-store
    kind: ClusterSecretStore
  target:
    name: ecr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
      .dockerconfigjson: |
        {{ `{"auths":{"746486152802.dkr.ecr.ap-south-1.amazonaws.com":{"username":"AWS","password":"{{ .ecrToken }}","auth":"{{ printf "AWS:%s" .ecrToken | b64enc }}"}}}` }}
  data:
    - secretKey: ecrToken
      remoteRef:
        key: /devportal/ecr/token