{{- if .Values.backend.enabled }}

apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    component: backend
    managed-by: devportal
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
    component: backend
  ports:
    - port: 80
      targetPort: {{ .Values.backend.port }}
{{- end }}
