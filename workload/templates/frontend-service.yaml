{{- if .Values.frontend.enabled }}

apiVersion: v1
kind: Service

metadata:
  name: {{ .Release.Name }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    component: frontend
    managed-by: devportal
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
    component: frontend
  ports:
    - port: 80
      targetPort: {{ .Values.frontend.port }}
{{- end }}